name: Build Wheels

on:
  workflow_call:
    inputs:
      sdist-name:
        description: Name of the source distribution file
        required: true
        type: string
      build-all:
        description: Build all wheels including musllinux
        type: boolean
      build-riscv64:
        description: Build riscv64 wheels (slow; skipped by default)
        type: boolean
        default: false

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }} for ${{ matrix.archs }}
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-24.04-arm
          archs: aarch64
        - os: ubuntu-latest
          archs: x86_64
        - os: macos-latest
          archs: arm64
        - os: macos-15-intel
          archs: x86_64
        - os: windows-11-arm
          archs: ARM64
        - os: windows-latest
          archs: AMD64

    env:
      CIBW_SKIP: "${{ !inputs.build-all && '*-musllinux_*' || '' }}"

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Download source distribution
      uses: actions/download-artifact@v6
      with:
        name: artifact-sdist
        path: dist

    # TODO: Remove this once the action supports specifying extras, see:
    # https://github.com/pypa/cibuildwheel/pull/2630
    - name: Install uv
      if: runner.os != 'Linux'
      uses: astral-sh/setup-uv@v7

    - name: Build & Test Wheels
      uses: pypa/cibuildwheel@v3.2.1
      with:
        config-file: .cibuildwheel.toml
        package-dir: dist/${{ inputs.sdist-name }}
      env:
        CIBW_ARCHS: "${{ matrix.archs }}"

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: artifact-wheels-${{ matrix.os }}-${{ matrix.archs }}
        path: wheelhouse/*.whl
        if-no-files-found: error

  build-wheels-riscv64:
    name: Build wheels on ubuntu-24.04-riscv for riscv64
    if: inputs.build-riscv64
    runs-on: ubuntu-24.04-riscv

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Download source distribution
      uses: actions/download-artifact@v6
      with:
        name: artifact-sdist
        path: dist

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    # On riscv64 the pypa/cibuildwheel action calls actions/setup-python
    # internally, which has no riscv64 binaries. Run cibuildwheel via uvx
    # instead. Keep version in sync with pypa/cibuildwheel@v3.2.1 above.
    - name: Build & Test Wheels (riscv64 native)
      run: |
        uvx cibuildwheel==3.2.1 --output-dir wheelhouse \
          --config-file "$GITHUB_WORKSPACE/.cibuildwheel.toml" \
          dist/${{ inputs.sdist-name }}
      env:
        CIBW_ARCHS: riscv64

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: artifact-wheels-ubuntu-24.04-riscv-riscv64
        path: wheelhouse/*.whl
        if-no-files-found: error
